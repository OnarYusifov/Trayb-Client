name: Build and release client

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.3.3-trayb.1"
        required: true
        default: "v0.3.3-trayb.1"
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Windows installer
        run: yarn build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: trayb-client-windows
          path: |
            dist/nsis-web/Trayb-Client-Setup.exe
            dist/nsis-web/*.nsis.7z
            dist/nsis-web/latest.yml
            dist/nsis-web/*.blockmap
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: Trayb Client ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            dist/nsis-web/Trayb-Client-Setup.exe
            dist/nsis-web/*.nsis.7z
            dist/nsis-web/latest.yml
            dist/nsis-web/*.blockmap
